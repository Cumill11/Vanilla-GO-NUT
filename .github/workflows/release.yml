name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o vanillanut-linux-amd64 .
          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o vanillanut-linux-arm64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o vanillanut-darwin-arm64 .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vanillanut-linux-amd64
            vanillanut-linux-arm64
            vanillanut-darwin-arm64
          generate_release_notes: true
